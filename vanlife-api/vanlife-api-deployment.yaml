apiVersion: apps/v1
kind: Deployment
metadata:
  name: vanlife-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vanlife-api
  template:
    metadata:
      labels:
        app: vanlife-api
    spec:
      containers:
        - name: vanlife-api
          image: nicejohnny1/vanlife-api:1.0
          env:
            - name: PORT
              value: "3000"
            - name: DB_HOST
              value: "10.10.3.3" # Mettez l'adresse IP de votre VM qui héberge la BD
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: vanlife-db-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vanlife-db-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vanlife-db-secret
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              value: 7d
          ports:
            - containerPort: 3000